services:
  - name: petfinder-api
    type: web
    runtime: docker
    plan: free
    region: ohio
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "8080"

      # MongoDB Atlas — cole a connection string do Atlas
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: petfinder

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: OAUTH_STATE_SECRET
        generateValue: true

      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URL
        sync: false

      # Storage — use S3/Cloudflare R2 (disco local não persiste no Render free)
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false        # e.g. "us-east-1" for AWS S3; "auto" for Cloudflare R2
      - key: S3_ENDPOINT
        sync: false        # vazio para AWS; URL do R2 para Cloudflare
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: UPLOAD_BASE_URL
        sync: false        # URL pública do CDN ou do bucket
      - key: MAX_UPLOAD_MB
        value: "5"
