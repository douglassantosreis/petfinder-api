basePath: /
definitions:
  ad.GeoPoint:
    properties:
      coordinates:
        items:
          type: number
        type: array
      type:
        type: string
    type: object
  ad.Status:
    enum:
    - open
    - resolved
    - archived
    type: string
    x-enum-varnames:
    - StatusOpen
    - StatusResolved
    - StatusArchived
  handler.ConversationResponse:
    properties:
      id:
        type: string
      lastMessageAt:
        type: string
      participants:
        items:
          type: string
        type: array
      reportId:
        type: string
    type: object
  handler.CreateReportRequest:
    properties:
      characteristics:
        items:
          type: string
        type: array
      description:
        type: string
      isShelteredByReporter:
        type: boolean
      lastSeenLocation:
        $ref: '#/definitions/ad.GeoPoint'
      petType:
        type: string
      photos:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  handler.HealthResponse:
    properties:
      status:
        type: string
    type: object
  handler.MessageResponse:
    properties:
      body:
        type: string
      conversationId:
        type: string
      createdAt:
        type: string
      id:
        type: string
      senderId:
        type: string
    type: object
  handler.OAuthCallbackResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
      user:
        $ref: '#/definitions/handler.UserResponse'
    type: object
  handler.PatchReportRequest:
    properties:
      characteristics:
        items:
          type: string
        type: array
      description:
        type: string
      isShelteredByReporter:
        type: boolean
      lastSeenLocation:
        $ref: '#/definitions/ad.GeoPoint'
      photos:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  handler.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  handler.RefreshResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  handler.ReportResponse:
    properties:
      characteristics:
        items:
          type: string
        type: array
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      isShelteredByReporter:
        type: boolean
      lastSeenLocation:
        $ref: '#/definitions/ad.GeoPoint'
      ownerId:
        type: string
      petType:
        type: string
      photos:
        items:
          type: string
        type: array
      status:
        $ref: '#/definitions/ad.Status'
      title:
        type: string
      updatedAt:
        type: string
    type: object
  handler.SendMessageRequest:
    properties:
      body:
        type: string
    type: object
  handler.StartConversationRequest:
    properties:
      ownerId:
        type: string
    type: object
  handler.StartOAuthResponse:
    properties:
      authUrl:
        type: string
    type: object
  handler.UpdateMeRequest:
    properties:
      city:
        type: string
      name:
        type: string
      state:
        type: string
    type: object
  handler.UserResponse:
    properties:
      avatarUrl:
        type: string
      city:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      state:
        type: string
    type: object
info:
  contact: {}
  description: API para cadastro de animais perdidos e comunicação interna.
  title: Lost Pet Finder API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns API health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user session
      tags:
      - auth
  /v1/auth/oauth/google/callback:
    get:
      parameters:
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.OAuthCallbackResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Handle Google OAuth callback
      tags:
      - auth
  /v1/auth/oauth/google/start:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StartOAuthResponse'
      summary: Start Google OAuth flow
      tags:
      - auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Refresh session tokens
      tags:
      - auth
  /v1/conversations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.ConversationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List current user conversations
      tags:
      - messaging
  /v1/conversations/{id}/messages:
    get:
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.MessageResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List messages from a conversation
      tags:
      - messaging
    post:
      consumes:
      - application/json
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      - description: Message payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.SendMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Send message to conversation
      tags:
      - messaging
  /v1/reports:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.ReportResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List open reports
      tags:
      - reports
    post:
      consumes:
      - application/json
      parameters:
      - description: Report payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.CreateReportRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.ReportResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create found animal report
      tags:
      - reports
  /v1/reports/{id}:
    get:
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ReportResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get report by ID
      tags:
      - reports
    patch:
      consumes:
      - application/json
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      - description: Report payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.PatchReportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ReportResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update found animal report
      tags:
      - reports
  /v1/reports/{id}/archive:
    post:
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ReportResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Archive report
      tags:
      - reports
  /v1/reports/{id}/conversations:
    post:
      consumes:
      - application/json
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      - description: Conversation payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.StartConversationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start conversation for a report
      tags:
      - messaging
  /v1/reports/{id}/resolve:
    post:
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ReportResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Mark report as resolved
      tags:
      - reports
  /v1/users/me:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Soft delete current user
      tags:
      - users
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - users
    patch:
      consumes:
      - application/json
      parameters:
      - description: Profile update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
